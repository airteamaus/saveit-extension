<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buckley's Bookmarks</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="shared-ui.css">
  <link rel="stylesheet" href="newtab.css">
</head>
  <body>
  <main id="saved-pages-page" class="saved-pages-page" aria-label="Saved pages">
    <section id="saved-pages-page-shell" class="saved-pages-page-shell" aria-label="Saved pages">
      <div id="saved-pages-page-header" class="saved-pages-page-header">
        <a href="newtab.html" class="logo logo-hero saved-pages-page-logo">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
          </svg>
          Buckley's
        </a>

        <form id="saved-pages-search-form" class="search-form saved-pages-page-search" role="search">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
          </span>
          <input
            type="text"
            id="saved-pages-search-input"
            class="search-input saved-pages-page-search-input"
            placeholder="Search your saved pages..."
            autocomplete="off"
            autofocus
          >
          <button id="saved-pages-search-clear-btn" class="clear-search hidden" type="button" title="Clear search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </form>

        <div class="saved-pages-page-actions">
          <button id="hero-sign-in-btn" class="sign-in-btn hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
              <polyline points="10 17 15 12 10 7"></polyline>
              <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
            Sign in
          </button>

          <div id="hero-user-menu" class="user-menu hidden">
            <button id="hero-user-avatar-btn" class="user-avatar-btn" title="Account">
              <span id="hero-user-avatar" class="user-avatar"></span>
            </button>
            <div id="hero-user-dropdown" class="user-dropdown hidden" data-dropdown-mode="class">
              <div id="hero-theme-toggle-container"></div>
              <button id="hero-import-btn" class="dropdown-item" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Import bookmarks
              </button>
              <button id="hero-refresh-btn" class="dropdown-item" type="button" title="Clear the local cache and reload everything from the server">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <polyline points="23 4 23 10 17 10"></polyline>
                  <polyline points="1 20 1 14 7 14"></polyline>
                  <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                Refresh cache
              </button>
              <button id="hero-mirror-toggle" class="dropdown-item" type="button" aria-pressed="false" title="Keep a Buckley's/ folder in your browser bookmarks in sync with your saved pages">
                <svg class="dropdown-item-icon mirror-toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <span class="dropdown-item-label">Sync to browser</span>
              </button>
              <button id="hero-sharing-btn" class="dropdown-item" type="button" title="Review who can see each of your projects">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                  <circle cx="18" cy="5" r="3"></circle>
                  <circle cx="6" cy="12" r="3"></circle>
                  <circle cx="18" cy="19" r="3"></circle>
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                </svg>
                Sharing
              </button>
              <div class="user-info">
                <span id="hero-user-email" class="user-email"></span>
              </div>
                <button id="hero-sign-out-btn" class="dropdown-item dropdown-item-danger">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                  <polyline points="16 17 21 12 16 7"></polyline>
                  <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                  Sign out
                </button>
            </div>
          </div>
        </div>
      </div>
      <div id="saved-pages-page-body" class="saved-pages-page-body">
        <aside id="project-sidebar" class="project-sidebar saved-pages-page-sidebar" aria-label="Projects"></aside>
        <div class="saved-pages-page-content">
          <div id="saved-pages-results" class="saved-pages-page-results" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="minimal-footer">
    <a href="https://getsave.it/privacy/" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
    <span id="hero-version-indicator">v<span id="hero-version-number">...</span></span>
  </footer>

  <div id="project-editor-backdrop" class="project-editor-backdrop hidden" aria-hidden="true"></div>
  <div
    id="project-editor-dialog"
    class="project-editor-dialog hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="project-editor-title"
  ></div>

  <div id="import-panel-backdrop" class="project-editor-backdrop hidden" aria-hidden="true"></div>
  <div
    id="import-panel-dialog"
    class="project-editor-dialog import-panel-dialog hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="import-panel-title"
  ></div>

  <div id="sharing-centre-backdrop" class="project-editor-backdrop hidden" aria-hidden="true"></div>
  <div
    id="sharing-centre-dialog"
    class="project-editor-dialog sharing-centre-dialog hidden"
    role="dialog"
    aria-modal="true"
    aria-labelledby="sharing-centre-title"
  ></div>

  <!-- Toast notifications (e.g. mirror-toggle confirmations). Auto-dismiss. -->
  <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="false"></div>

  <!-- Minimal script dependencies -->
  <script src="polyfill-loader.js"></script>
  <script type="module" src="config-loader.js"></script>
  <script type="module" src="bundles/sentry-init.js"></script>
  <script type="module" src="firebase-init-pages.js"></script>
  <script src="mock-data.js"></script>
  <script src="auth-menu.js"></script>
  <script src="theme-manager.js"></script>
  <script type="module" src="newtab.js"></script>
</body>
</html>
