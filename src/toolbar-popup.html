<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newtab Bookmarks</title>
  <link rel="icon" type="image/png" href="icon.png">
  <!-- Apply the stored theme before paint so the popup never flashes the
       wrong theme when it opens. External script because the extension CSP
       blocks inline scripts. The new-tab page owns the source of truth
       (theme-manager.js); the popup reads the same localStorage key on each
       open and reincarnates every open, so it stays in sync for free. -->
  <script src="toolbar-popup-theme.js"></script>
  <link rel="stylesheet" href="shared-ui.css">
  <link rel="stylesheet" href="toolbar-popup.css">
</head>
<body>
  <main class="toolbar-popup-shell">
    <header class="toolbar-popup-header">
      <p class="toolbar-popup-eyebrow">Newtab</p>
      <h1 class="toolbar-popup-title">Save this page</h1>
    </header>

    <button id="save-default-btn" class="toolbar-popup-save-btn" type="button">
      Save
    </button>

    <section class="toolbar-popup-section" aria-labelledby="toolbar-projects-heading">
      <h2 id="toolbar-projects-heading" class="toolbar-popup-section-title">Projects</h2>
      <div id="toolbar-project-list" class="toolbar-popup-project-list" aria-busy="true">
        <p class="toolbar-popup-empty">Loading projects...</p>
      </div>
    </section>

    <p id="toolbar-popup-status" class="toolbar-popup-status" aria-live="polite"></p>
  </main>

  <script type="module" src="toolbar-popup.js"></script>
</body>
</html>
