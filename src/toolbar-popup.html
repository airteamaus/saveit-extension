<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaveIt</title>
  <link rel="icon" type="image/png" href="icon.png">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      min-width: 320px;
      background: #f8fafc;
      color: #0f172a;
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
      max-height: 520px;
    }

    .toolbar-popup-shell {
      padding: 12px;
    }

    .toolbar-popup-header {
      margin-bottom: 8px;
    }

    .toolbar-popup-eyebrow {
      margin: 0 0 4px;
      color: #475569;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .toolbar-popup-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .toolbar-popup-save-btn,
    .toolbar-popup-project-btn {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #ffffff;
      color: inherit;
      font: inherit;
      text-align: left;
    }

    .toolbar-popup-save-btn {
      margin-bottom: 10px;
      padding: 10px 12px;
      border-color: #5b8c7a;
      background: #5b8c7a;
      color: #ffffff;
      font-weight: 600;
    }

    .toolbar-popup-section {
      margin-bottom: 8px;
    }

    .toolbar-popup-section-title {
      margin: 0 0 6px;
    }

    .toolbar-popup-project-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .toolbar-popup-empty,
    .toolbar-popup-status {
      margin: 0;
      color: #475569;
    }
  </style>
  <link rel="stylesheet" href="toolbar-popup.css">
</head>
<body>
  <main class="toolbar-popup-shell">
    <header class="toolbar-popup-header">
      <p class="toolbar-popup-eyebrow">SaveIt</p>
      <h1 class="toolbar-popup-title">Save this page</h1>
    </header>

    <button id="save-default-btn" class="toolbar-popup-save-btn" type="button">
      Save
    </button>

    <section class="toolbar-popup-section" aria-labelledby="toolbar-projects-heading">
      <h2 id="toolbar-projects-heading" class="toolbar-popup-section-title">Projects</h2>
      <div id="toolbar-project-list" class="toolbar-popup-project-list" aria-busy="true">
        <p class="toolbar-popup-empty">Loading projects...</p>
      </div>
    </section>

    <p id="toolbar-popup-status" class="toolbar-popup-status" aria-live="polite"></p>
  </main>

  <script type="module" src="toolbar-popup.js"></script>
</body>
</html>
